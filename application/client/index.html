<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time Tracker</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1f242d;
        --line: #2b313c;
        --text: #e6e9ef;
        --muted: #8b93a1;
        --accent: #6ea8fe;
        --green: #7fd1a0;
        --danger: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .topbar {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        padding: 0.75rem 1.25rem;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }
      .topbar h1 { font-size: 1.05rem; margin: 0; }
      .topbar .s_uuid { color: var(--muted); font-size: 0.78rem; font-family: ui-monospace, monospace; }
      .topbar .s_status { margin-left: auto; color: var(--muted); font-size: 0.8rem; }

      .content {
        max-width: 540px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .row-add {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .row-add input {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        color: var(--text);
        font-size: 0.95rem;
      }
      .row-add button {
        background: var(--accent);
        color: #0f1115;
        border: none;
        border-radius: 8px;
        padding: 0 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      ul { list-style: none; margin: 0; padding: 0; }
      .row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.6rem 0.5rem;
        border-bottom: 1px solid var(--line);
      }
      .row--running { background: rgba(127, 209, 160, 0.08); border-radius: 8px; }

      .btn-play {
        width: 2.1rem;
        height: 2.1rem;
        flex: 0 0 auto;
        border: none;
        border-radius: 50%;
        background: var(--panel-2);
        color: var(--accent);
        font-size: 0.95rem;
        cursor: pointer;
        display: grid;
        place-items: center;
      }
      .row--running .btn-play { background: var(--green); color: #0f1115; }

      .info { flex: 1; min-width: 0; }
      .name { font-size: 1rem; }
      .current {
        color: var(--green);
        font-size: 0.82rem;
        font-variant-numeric: tabular-nums;
        font-family: ui-monospace, monospace;
        margin-top: 0.1rem;
      }

      .sum {
        font-variant-numeric: tabular-nums;
        font-family: ui-monospace, monospace;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .btn-del {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 0.9rem;
        padding: 0.25rem 0.4rem;
        opacity: 0.5;
      }
      .btn-del:hover { opacity: 1; color: var(--danger); }

      .empty { color: var(--muted); padding: 1rem 0.5rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/client/main.js"></script>
  </body>
</html>
